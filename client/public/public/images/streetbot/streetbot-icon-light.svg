<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 326.56 304.58">
  <defs>
    <style>
      .cls-dark { fill: #131517; }
      .cls-yellow { fill: #fdd30b; }

      /* Eye blinking animation - human-like */
      .eye {
        animation: blink 5s infinite;
        transform-origin: center;
        transform-box: fill-box;
      }

      @keyframes blink {
        0%, 100% { transform: scaleY(1); }
        /* First blink */
        14% { transform: scaleY(1); }
        15% { transform: scaleY(0.05); }
        17% { transform: scaleY(1); }
        /* Quick double blink */
        18% { transform: scaleY(1); }
        19% { transform: scaleY(0.05); }
        21% { transform: scaleY(1); }
        /* Long pause, then another blink */
        70% { transform: scaleY(1); }
        71% { transform: scaleY(0.05); }
        73% { transform: scaleY(1); }
      }

      /* Antenna bobbing animation - synced with bounce */
      .antenna {
        animation: antennaBob 3s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        transform-origin: bottom center;
        transform-box: fill-box;
      }

      @keyframes antennaBob {
        0%, 100% { transform: rotate(0deg) translateY(0); }
        25% { transform: rotate(2deg) translateY(-2px); }
        50% { transform: rotate(0deg) translateY(-4px); }
        75% { transform: rotate(-2deg) translateY(-2px); }
      }

      /* Smooth bouncy float */
      .bot-head {
        animation: headBounce 3s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }

      @keyframes headBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }

      /* Smile animation - subtle breathing */
      .smile {
        animation: smilePulse 4s ease-in-out infinite;
        transform-origin: center;
        transform-box: fill-box;
      }

      @keyframes smilePulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.03); opacity: 0.95; }
      }
    </style>
  </defs>

  <!-- Bot without external glow -->
  <g class="bot-head">
    <!-- Yellow body background -->
    <rect class="cls-yellow" x="53.82" y="99.92" width="223.62" height="145.69" rx="66.53" ry="66.53"/>

