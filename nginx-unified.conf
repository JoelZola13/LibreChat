upstream librechat {
    server api:3180;
}

upstream paperclip {
    server host.docker.internal:3100;
}

upstream social {
    server host.docker.internal:3182;
}

upstream social-ws {
    server host.docker.internal:3183;
}

server {
    listen 3180;
    server_name localhost;

    client_max_body_size 100M;

    # --- Paperclip SPA routes ---
    location /STR/ {
        proxy_pass http://paperclip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";

        # Inject unified nav into Paperclip pages
        sub_filter '</body>' '<script src="/unified-nav.js?v=84"></script><script src="/paperclip-customizations.js?v=2"></script><script src="/sp-dropdown.js?v=2"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }

    # ====================================================================
    # LibreChat API routes (explicit — everything else under /api/ goes to Paperclip)
    # ====================================================================
    # Paperclip auth (exact match before LibreChat catch-all)
    location = /api/auth/get-session {
        proxy_pass http://paperclip;
        proxy_set_header Host $host;
    }
    location /api/auth {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/actions {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/keys {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/user {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/search {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/messages {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/convos {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/presets {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/prompts {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/categories {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/endpoints {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/balance {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/models {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/config {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/assistants {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/files {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/share {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/roles {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/banner {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/memories {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/permissions {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/tags {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/mcp {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location /api/settings {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }

    # LibreChat SSE/streaming (ask, edit)
    location /api/ask {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
    location /api/edit {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # /api/agents — shared by both apps
    # LibreChat-specific sub-routes (chat streaming, categories) → LibreChat
    location /api/agents/chat {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
    location = /api/agents/categories {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    # Exact /api/agents root (list/create) → LibreChat
    location = /api/agents {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    location = /api/agents/ {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }
    # Everything else /api/agents/:slug_or_uuid → Paperclip
    location /api/agents/ {
        proxy_pass http://paperclip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Groups API (local nanobot) ──────────────────────────────
    location /sbapi/groups {
        rewrite ^/sbapi/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:18790;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Academy API (proxied through nanobot to SBP backend) ──
    location /sbapi/api/academy {
        rewrite ^/sbapi/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:18790;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Gallery API (local uploads + artwork management) ────────────
    location /sbapi/gallery {
        rewrite ^/sbapi/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:18790;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50M;
    }

    # ── Nanobot API v1 (agents, models, TTS, etc.) ─────────────────
    location /sbapi/v1 {
        rewrite ^/sbapi/(.*)$ /$1 break;
        proxy_pass http://host.docker.internal:18790;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── StreetBot Backend API (/sbapi) ──────────────────────────
    location /sbapi {
        proxy_pass https://librechat-api-production.up.railway.app;
        proxy_set_header Host librechat-api-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Directus CMS (/cms) ──────────────────────────────────────
    location /cms/ {
        proxy_pass https://directus-production-8852.up.railway.app/;
        proxy_set_header Host directus-production-8852.up.railway.app;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Directory API ─────────────────────────────────────────────
    location /api/directory {
        proxy_pass https://streetvoices-directory.pages.dev;
        proxy_set_header Host streetvoices-directory.pages.dev;
        proxy_ssl_server_name on;
    }

    # ── Paperclip internal API (for PATCH operations like assign) ──
    location /paperclip-internal/ {
        proxy_pass http://paperclip/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Paperclip Relay (dispatch, dashboard aggregation) ──────────
    location /relay/ {
        proxy_pass http://host.docker.internal:3050/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Social app profiles API (used by directory page)
    location /api/street-profiles {
        proxy_pass http://social/social/api/street-profile/list;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    # ====================================================================
    # All other /api/ routes → Paperclip
    # (companies, issues, goals, projects, approvals, heartbeat-runs, etc.)
    # ====================================================================
    location /api/ {
        proxy_pass http://paperclip;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Paperclip WebSocket
    location /ws {
        proxy_pass http://paperclip;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Paperclip static assets (favicon, manifest)
    location = /favicon.ico { proxy_pass http://paperclip; }
    location = /favicon.svg { proxy_pass http://paperclip; }
    location = /favicon-32x32.png { proxy_pass http://paperclip; }
    location = /favicon-16x16.png { proxy_pass http://paperclip; }
    location = /apple-touch-icon.png { proxy_pass http://paperclip; }
    location = /site.webmanifest { proxy_pass http://paperclip; }

    # Paperclip JS/CSS bundles (index-XXXX pattern)
    location ~ ^/assets/index- {
        proxy_pass http://paperclip;
        proxy_set_header Host $host;
    }

    # All other /assets/ → LibreChat
    location /assets/ {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }

    # OAuth endpoints
    location /oauth/ {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
    }

    # LibreChat WebSocket
    location /socket.io/ {
        proxy_pass http://librechat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Service Worker: exclude /social routes from LibreChat SW ──
    location = /sw.js {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        sub_filter_types application/javascript;
        sub_filter_once on;
        sub_filter 'denylist:[/^\/oauth/' 'denylist:[/^\/social/,/^\/oauth/';
    }

    # ── SV Social (/social and /social/*) ────────────────────────
    # Redirect old street-profile URLs to Paperclip profile page
    location /social/street-profile/ {
        return 302 /settings;
    }

    # unified-nav.js is NOT injected here — it prepends DOM nodes to <body>
    # which breaks Next.js App Router hydration (causes 404 fallback).
    # The social app loads platform scripts via its own layout instead.
    location /social {
        proxy_pass http://social;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host:$server_port;
        proxy_set_header Accept-Encoding "";

        # Override aggressive cache headers from Next.js static pages
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # SV Social Socket.IO (separate port to avoid Next.js App Router interception)
    location /ws-social {
        proxy_pass http://social-ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Home page — same LibreChat chat interface but with top nav injected
    location = /home {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";

        sub_filter '</head>' '<script>!function(){window.__SV_HOME=true;window.__SV_NAV_LOG=[];var o=history.replaceState.bind(history);history.replaceState=function(){window.__SV_NAV_LOG.push("replace:"+arguments[2]+":path:"+location.pathname);if(String(arguments[2]).indexOf("/c/new")!==-1)return;return o.apply(this,arguments)};var p=history.pushState.bind(history);history.pushState=function(){window.__SV_NAV_LOG.push("push:"+arguments[2]+":path:"+location.pathname);if(String(arguments[2]).indexOf("/c/new")!==-1)return;return p.apply(this,arguments)}}();</script></head>';
        sub_filter '</body>' '<script src="/unified-nav.js?v=84"></script><script src="/mission-control.js?v=5"></script><script src="/automations.js?v=7"></script><script src="/sv-template.js?v=61"></script><script src="/home-topnav.js?v=23"></script><script src="/sp-dropdown.js?v=2"></script></body>';
        sub_filter_once off;
        sub_filter_types text/html;
    }

    # Default: LibreChat
    location / {
        proxy_pass http://librechat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";

        sub_filter '</body>' '<script src="/unified-nav.js?v=84"></script><script src="/mission-control.js?v=5"></script><script src="/automations.js?v=7"></script><script src="/sv-template.js?v=61"></script><script src="/home-topnav.js?v=23"></script><script src="/directory-profiles.js?v=1"></script><script src="/sp-dropdown.js?v=2"></script></body>';
        sub_filter_once on;
        sub_filter_types text/html;
    }
}
